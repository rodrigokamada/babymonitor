name: Heroku

on:
  push:
    branches:
    - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Sync to Heroku
      if: success()
      uses: akhileshns/heroku-deploy@v3.12.12
      with:
        heroku_api_key: ${{secrets.HEROKU_API_KEY}}
        heroku_app_name: "baby-monitor-server"
        heroku_email: ${{secrets.HEROKU_EMAIL}}
        appdir: ./backend
        branch: "main"
        dontuseforce: false

