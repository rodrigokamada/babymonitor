name: Heroku

on:
  push:
    branches:
    - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 16

    - name: Install the dependencies
      working-directory: ./backend
      run: npm install

    - name: Build
      working-directory: ./backend
      run: npm run build

    - name: GitHub
      run: |
      git config user.email "rodrigo@kamada.com.br"
      git config user.name "Rodrigo Kamada"
      git add -A && git commit -m "Updated code"

    - name: Sync to Heroku
      if: success()
      uses: akhileshns/heroku-deploy@v3.12.12
      with:
        heroku_api_key: ${{secrets.HEROKU_API_KEY}}
        heroku_app_name: "baby-monitor-server"
        heroku_email: ${{secrets.HEROKU_EMAIL}}
        appdir: ./backend
        branch: "main"
        dontuseforce: true

